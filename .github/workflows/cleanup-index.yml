name: Cleanup Global Helm Index

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: "List stale entries without removing them"
        type: boolean
        default: true

permissions:
  contents: write

jobs:
  cleanup-index:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: gh-pages

      - name: Install yq
        run: |
          sudo wget -qO /usr/local/bin/yq https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64
          sudo chmod +x /usr/local/bin/yq

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Download upstream indices
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          REPOS="ixy paperboy papergirl mgnl-on-k8s"

          for repo in $REPOS; do
            echo "Fetching index from $repo..."
            # Read straight from the gh-pages branch via the API, NOT GitHub Pages
            # (Pages adds a build delay + Fastly cache). The branch is authoritative.
            for i in $(seq 1 6); do
              if curl -sf \
                -H "Authorization: Bearer $GH_TOKEN" \
                -H "Accept: application/vnd.github.raw" \
                -H "X-GitHub-Api-Version: 2022-11-28" \
                "https://api.github.com/repos/neoskop/${repo}/contents/index.yaml?ref=gh-pages" \
                -o "upstream_${repo}.yaml"; then
                break
              fi
              echo "  Retry $i for $repo..."
              sleep 10
            done

            if [ ! -f "upstream_${repo}.yaml" ]; then
              echo "::error::Failed to download index for $repo"
              exit 1
            fi
          done

          # Reference set: every "name|version" pair present in any upstream index.
          # Charts are keyed by their .name (e.g. mgnl-on-k8s publishes chart "mgnl"),
          # so match on the entry's name, not the repo name.
          : > keep.txt
          for repo in $REPOS; do
            yq eval '.entries | to_entries[] | .value[] | .name + "|" + .version' \
              "upstream_${repo}.yaml" >> keep.txt
          done
          sort -u keep.txt -o keep.txt

      - name: Compute stale entries
        id: stale
        run: |
          yq eval '.entries | to_entries[] | .value[] | .name + "|" + .version' \
            index.yaml | sort -u > current.txt
          comm -23 current.txt keep.txt > stale.txt

          count=$(wc -l < stale.txt)
          echo "count=$count" >> "$GITHUB_OUTPUT"

          {
            echo "### Stale index entries: $count"
            if [ "$count" -eq 0 ]; then
              echo "Merged index is in sync with upstream indices."
            else
              echo '```'
              cat stale.txt
              echo '```'
            fi
          } >> "$GITHUB_STEP_SUMMARY"
          cat stale.txt

      - name: Remove stale entries and push
        if: steps.stale.outputs.count != '0' && inputs.dry_run == false
        run: |
          while IFS='|' read -r name ver; do
            name="$name" ver="$ver" yq eval -i \
              '.entries[env(name)] |= map(select(.version != env(ver)))' index.yaml
          done < stale.txt

          # Drop charts left with no versions (e.g. a whole repo removed upstream).
          yq eval -i '.entries |= with_entries(select(.value | length > 0))' index.yaml
          yq eval -i ".generated=\"$(date -Ins | tr , .)\"" index.yaml

          git add index.yaml
          if git diff --cached --quiet; then
            echo "No changes to index.yaml"
            exit 0
          fi
          git commit -m "chore: Remove stale chart index entries."
          git push
